<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fleet Board Pro — Driver</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="loading">
  <div class="app">
    <header class="topbar">
      <div class="brand">🚚 Fleet Board Pro</div>
      <div class="user-info">
        <span id="userName" class="user-name"></span>
        <span id="roleBadge" class="badge"></span>
      </div>
      <button id="logoutBtn" class="btn btn-outline" type="button">Log Out</button>
    </header>

    <main class="content driver-main">
      <h2>My Jobs</h2>
      <p class="muted page-sub"><span id="companyName"></span></p>

      <section class="cards">
        <div class="card">
          <h3>🚚 Current Job</h3>
          <p>No job assigned yet. Your next job will appear here with
             pickup and drop-off details.</p>
          <span class="soon">Coming soon</span>
        </div>
        <div class="card">
          <h3>📍 My Location</h3>
          <p>Location sharing will be available here during trips.</p>
          <span class="soon">Coming soon</span>
        </div>
      </section>
    </main>
  </div>

  <div class="loader">Loading…</div>

  <script src="vendor/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>initDashboard('driver');</script>
</body>
</html>
