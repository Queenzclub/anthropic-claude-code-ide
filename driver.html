<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fleet Board Pro — Driver</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="loading">
  <div class="app">
    <header class="topbar">
      <div class="brand">🚚 Fleet Board Pro</div>
      <div class="user-info">
        <span id="userName" class="user-name"></span>
        <span id="roleBadge" class="badge"></span>
      </div>
      <button id="logoutBtn" class="btn btn-outline" type="button">Log Out</button>
    </header>

    <main class="content driver-main">
      <h2>My Jobs</h2>
      <p class="muted page-sub"><span id="companyName"></span></p>

      <div id="flash"></div>

      <section>
        <div class="section-head">
          <h3>🚚 Current Job</h3>
          <button id="refreshJobs" class="btn btn-outline btn-small" type="button">Refresh</button>
        </div>
        <div id="jobList" class="request-list"></div>
      </section>

      <section class="panel" style="margin-top: 1.75rem;">
        <h3>📍 Location Sharing</h3>
        <p class="muted" id="locStatus">Location sharing is off.</p>
        <p class="muted small" id="locLast"></p>
        <button id="locToggle" class="btn btn-primary btn-block" type="button">Share Location</button>
      </section>
    </main>
  </div>

  <div class="loader">Loading…</div>

  <script src="vendor/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/driver.js"></script>
  <script>
    initDashboard('driver').then(function (ctx) { if (ctx) initDriverPage(ctx); });
  </script>
</body>
</html>
