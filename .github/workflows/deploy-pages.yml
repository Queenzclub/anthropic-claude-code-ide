# Deploys Fleet Board Pro to GitHub Pages on every push to main.
#
# Setup (one time, before merging this workflow):
#   Repo Settings → Secrets and variables → Actions → New repository secret
#     SUPABASE_URL       = https://YOUR-PROJECT.supabase.co
#     SUPABASE_ANON_KEY  = your anon (public) key
#   These are PUBLIC values (they ship to every browser anyway); secrets
#   just keep them out of the committed code. NEVER add the service_role
#   key here or anywhere else.
#
# The site is served at: https://<owner>.github.io/<repo>/
# GitHub Pages provides HTTPS, which geolocation and PWA install require.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create js/config.js from repository secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing secrets. Add SUPABASE_URL and SUPABASE_ANON_KEY under Settings → Secrets and variables → Actions."
            exit 1
          fi
          cat > js/config.js <<EOF
          // Generated at deploy time by .github/workflows/deploy-pages.yml
          window.FLEET_CONFIG = {
            SUPABASE_URL: '$SUPABASE_URL',
            SUPABASE_ANON_KEY: '$SUPABASE_ANON_KEY',
          };
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
