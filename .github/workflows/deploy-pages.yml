# Deploys Fleet Board Pro to GitHub Pages on every push to main.
#
# Setup (one time, before merging this workflow):
#   Repo Settings → Secrets and variables → Actions → New repository secret
#     SUPABASE_URL       = https://YOUR-PROJECT.supabase.co
#     SUPABASE_ANON_KEY  = your anon (public) key
#   These are PUBLIC values (they ship to every browser anyway); secrets
#   just keep them out of the committed code. NEVER add the service_role
#   key here or anywhere else.
#
# The site is served at: https://<owner>.github.io/<repo>/
# GitHub Pages provides HTTPS, which geolocation and PWA install require.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # js/config.js is committed with the public anon key, so no secrets
      # are needed. If you DO set SUPABASE_URL / SUPABASE_ANON_KEY secrets
      # (e.g. to point a fork at a different project), they override the
      # committed file here. Missing secrets are fine — we fall back.
      - name: Apply Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            cat > js/config.js <<EOF
          // Generated at deploy time by .github/workflows/deploy-pages.yml
          window.FLEET_CONFIG = {
            SUPABASE_URL: '$SUPABASE_URL',
            SUPABASE_ANON_KEY: '$SUPABASE_ANON_KEY',
          };
          EOF
            echo "Wrote js/config.js from repository secrets."
          elif [ -f js/config.js ]; then
            echo "Using committed js/config.js."
          else
            echo "::error::No secrets set and no committed js/config.js found."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
