<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Fleet Board Pro — Log In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">
      <div class="logo">🚚</div>
      <h1>Fleet Board Pro</h1>
      <p class="muted">Vehicle &amp; delivery management</p>

      <div id="configWarning" class="alert alert-error hidden">
        Supabase is not configured yet. Copy <code>js/config.example.js</code>
        to <code>js/config.js</code> and add your project URL and anon key.
      </div>

      <div id="loginError" class="alert alert-error hidden" role="alert"></div>

      <form id="loginForm" novalidate>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required
               placeholder="you@company.com">

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required
               placeholder="Your password">

        <button id="loginBtn" class="btn btn-primary btn-block" type="submit">Log In</button>
      </form>

      <p class="muted small">No account? Ask your admin to set one up.</p>
    </div>
  </main>

  <script src="vendor/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
